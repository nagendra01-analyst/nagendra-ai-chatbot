<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Chat with Nagendra | Marketing Analyst</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Segoe UI,Arial,sans-serif;background:#0f172a;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px}
.wrap{width:100%;max-width:500px;border-radius:20hpx;overflow:hidden;box-shadow:0 25px 60px rgba(0,0,0,0.5)}
.hdr{background:linear-gradient(135deg,#6366f1,#8b5cf6);padding:16px 20px;display:flex;align-items:center;gap:14px}
.av{width:54px;height:54px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-size:1.6rem;flex-shrink:0;border:3px solid rgba(255,255,255,0.4)}
.hi h2{color:#fff;font-size:1.05rem;font-weight:700;margin:0}
.hi p{color:rgba(255,255,255,0.85);font-size:0.78rem;margin:3px 0 0}
.dot{display:inline-block;width:8px;height:8px;background:#4ade80;border-radius:50%;margin-right:5px;animation:bl 1.5s infinite}
@keyframes bl{0%,100%{opacity:1}50%{opacity:0.2}}
.box{background:#1e293b;height:400px;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:8px}
.box::-webkit-scrollbar{width:4px}.box::-webkit-scrollbar-thumb{background:#334155;border-radius:4px}
.m{max-width:85%;padding:10px 14px;border-radius:16px;font-size:0.875rem;line-height:1.55;word-wrap:break-word;animation:fi 0.25s ease}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.b{background:#273549;color:#e2e8f0;border-bottom-left-radius:4px;align-self:flex-start}
.u{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border-bottom-right-radius:4px;align-self:flex-end}
.tp{display:flex;gap:4px;align-items:center;background:#273549;border-radius:16px;border-bottom-left-radius:4px;padding:12px 14px;width:58px;align-self:flex-start}
.tp span{width:7px;height:7px;background:#6366f1;border-radius:50%;animation:bo 1.2s infinite}
.tp span:nth-child(2){animation-delay:.2s}.tp span:nth-child(3){animation-delay:.4s}
@keyframes bo{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.sugg{display:flex;flex-wrap:wrap;gap:6px;padding:10px 14px;background:#1e293b;border-top:1px solid #2d3748}
.sb{background:#273549;color:#a5b4fc;border:1px solid #334155;border-radius:20px;padding:5px 12px;font-size:0.76rem;cursor:pointer;transition:all 0.2s}
.sb:hover{background:#6366f1;color:#fff;border-color:#6366f1}
.inp{display:flex;gap:8px;padding:12px;background:#273549;border-top:1px solid #334155}
.inp input{flex:1;background:#0f172a;border:1px solid #334155;border-radius:10px;padding:10px 14px;color:#e2e8f0;font-size:0.88rem;outline:none;transition:border .2s;font-family:inherit}
.inp input:focus{border-color:#6366f1}
.inp input::placeholder{color:#475569}
.snd{background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;border-radius:10px;width:42px;height:42px;color:#fff;font-size:1.1rem;cursor:pointer;flex-shrink:0;transition:opacity .2s}
.snd:hover{opacity:0.8}
.fn{text-align:center;color:#475569;font-size:0.7rem;padding:7px;background:#0f172a}
.fb{background:#273549;border-radius:16px;border-bottom-left-radius:4px;padding:16px;max-width:90%;align-self:flex-start;animation:fi 0.3s ease}
.fb h4{color:#a5b4fc;margin-bottom:12px;font-size:0.9rem}
.fb input,.fb select{width:100%;background:#0f172a;border:1px solid #334155;border-radius:8px;padding:8px 12px;color:#e2e8f0;font-size:0.82rem;margin-bottom:8px;outline:none;font-family:inherit}
.fb input:focus,.fb select:focus{border-color:#6366f1}
.fb select option{background:#1e293b}
.fb input::placeholder{color:#475569}
.ok{width:100%;background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;border-radius:8px;padding:10px;color:#fff;font-weight:700;font-size:0.85rem;cursor:pointer;margin-top:4px}
.ok:hover{opacity:0.85}
</style>
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>
<body>
<div class="wrap">
 <div class="hdr">
  <div class="av">&#128104;&#8205;&#128188;</div>
  <div class="hi"><h2>Nagendra Babu Gugulothu</h2><p><span class="dot"></span>Marketing Analyst &bull; New York, USA</p></div>
 </div>
 <div class="box" id="box"></div>
 <div class="sugg">
  <button class="sb" id="s1">&#128075; About</button>
  <button class="sb" id="s2">&#128736; Skills</button>
  <button class="sb" id="s3">&#128188; Experience</button>
  <button class="sb" id="s4">&#128197; Schedule</button>
  <button class="sb" id="s5">&#128222; Contact</button>
  <button class="sb" id="s6">&#127891; Education</button>
 </div>
 <div class="inp">
  <input type="text" id="inp" placeholder="Ask me anything..." />
  <button class="snd" id="snd">&#9658;</button>
 </div>
 <div class="fn">&#128161; Powered by Nagendra's personal AI assistant</div>
</div>
<script>
(function(){

emailjs.init("YOUR_EMAILJS_PUBLIC_KEY"); // Replace with your EmailJS public key
var box = document.getElementById("box");
var inp = document.getElementById("inp");
var snd = document.getElementById("snd");

function addMsg(txt, cls) {
  var d = document.createElement("div");
  d.className = "m " + cls;
  d.innerHTML = txt;
  box.appendChild(d);
  box.scrollTop = box.scrollHeight;
  return d;
}

function showTyping() {
  var d = document.createElement("div");
  d.className = "tp"; d.id = "tp";
  d.innerHTML = "<span></span><span></span><span></span>";
  box.appendChild(d);
  box.scrollTop = box.scrollHeight;
}

function removeTyping() {
  var t = document.getElementById("tp");
  if (t) t.parentNode.removeChild(t);
}

function getReply(msg) {
  var m = msg.toLowerCase();

  if (/^(hi|hello|hey|good morning|good afternoon|good evening|howdy|what.s up)/i.test(m)) {
    return "Hey there! &#128075; Great to connect! I'm <b>Nagendra Babu Gugulothu</b>, a Marketing Analyst based in New York. I have 4+ years of experience in digital marketing, analytics, and data-driven campaign optimization. How can I help you today?";
  }

  if (/about|introduce|yourself|who are you|background/i.test(m)) {
    return "I'm a <b>Marketing Analyst with 4+ years of experience</b> in digital marketing, marketing analytics, campaign optimization, customer segmentation, and growth analytics.<br><br>I've worked extensively with <b>SQL, Python, GA4, Tableau, Power BI, Google Ads, Meta Ads</b>, and marketing attribution models. I enjoy using data to improve marketing performance, increase conversions, and drive business growth. &#128640;";
  }

  if (/skill|expertise|speciali|proficien|know|good at|capable/i.test(m)) {
    return "Here are my core skills:<br><br>&#128202; <b>Analytics:</b> GA4, Tableau, Power BI, SQL, Python, BigQuery, Snowflake<br>&#128226; <b>Digital Marketing:</b> Google Ads, Meta Ads, LinkedIn Ads, SEO &amp; SEM<br>&#129504; <b>Strategy:</b> Attribution Modeling, MMM, A/B Testing, CRO, Customer Segmentation<br>&#128200; <b>Reporting:</b> Marketing Dashboards, Customer Journey Analytics, Funnel Optimization";
  }

  if (/experience|year|career|professional|history|job|work/i.test(m)) {
    return "I have <b>4+ years of professional experience</b> as a Marketing Analyst. In my current role I focus on:<br><br>&#10003; Campaign performance analysis<br>&#10003; Marketing dashboard development<br>&#10003; Customer segmentation &amp; attribution analysis<br>&#10003; ROI measurement &amp; growth analytics<br>&#10003; Predictive analytics &amp; SEO tracking<br>&#10003; Conversion rate optimization (CRO)<br><br>I love turning complex data into actionable insights that drive real business results! &#128188;";
  }

  if (/educat|degree|universit|college|study|master|ms |m\.s/i.test(m)) {
    return "&#127891; I hold a <b>Master of Science in Computer Science (Data Analytics)</b> from the <b>University of Bridgeport, USA</b>. This gave me a strong foundation in data science, statistical modeling, and advanced analytics which I apply daily in my marketing work.";
  }

  if (/tool|software|platform|technolog|stack/i.test(m)) {
    return "My tech stack:<br><br>&#128187; <b>Data:</b> SQL, Python, BigQuery, Snowflake<br>&#128202; <b>Visualization:</b> Tableau, Power BI<br>&#128226; <b>Ad Platforms:</b> Google Ads, Meta Ads, LinkedIn Ads<br>&#128200; <b>Web Analytics:</b> Google Analytics 4 (GA4)<br>&#9881; <b>Other:</b> Marketing automation, CRM platforms";
  }

  if (/current|role|responsib|day to day|daily|what do you do/i.test(m)) {
    return "In my current role as <b>Marketing Analyst</b>, I handle:<br><br>&#128200; Campaign performance analysis<br>&#128202; Marketing dashboard development<br>&#128101; Customer segmentation<br>&#127919; Attribution analysis &amp; ROI measurement<br>&#128269; SEO performance tracking<br>&#9881; Conversion rate optimization (CRO)";
  }

  if (/why hire|why should|strength|value|bring|offer/i.test(m)) {
    return "I bring a strong combination of <b>marketing knowledge, analytical thinking, and technical skills</b>. I have hands-on experience improving campaign performance, building dashboards, analyzing customer behavior, and supporting data-driven decisions. I'm a quick learner, collaborative, and always focused on delivering measurable business results. &#127919;";
  }

  if (/why interest|why this role|why apply|motivat/i.test(m)) {
    return "I'm passionate about using data to solve real business problems! Roles in marketing analytics let me combine my love of data with strategic marketing thinking &#8212; improving customer engagement, optimizing campaigns, and driving growth. I'm always excited by opportunities to contribute meaningfully to a growing organization. &#127775;";
  }

  if (/visa|authoriz|sponsor|work permit|citizen|status|green card/i.test(m)) {
    return "&#10003; I am <b>authorized to work in the United States</b> and do not require sponsorship at this time.";
  }

  if (/locat|where|city|state|reloc|remote|hybrid|onsite/i.test(m)) {
    return "&#128205; I'm based in <b>New York, USA</b>. I'm open to remote, hybrid, or on-site roles. Also open to relocation for the right opportunity!";
  }

  if (/salary|compensat|pay|expect|rate|package/i.test(m)) {
    return "I'm open to discussing compensation based on the role and overall opportunity. Looking for a competitive package that reflects my 4+ years of marketing analytics experience. Happy to discuss further! &#128522;";
  }

  if (/contact|email|phone|reach|number|call me/i.test(m)) {
    return "&#128236; Here are my contact details:<br><br>&#128100; <b>Name:</b> Nagendra Babu Gugulothu<br>&#128231; <b>Email:</b> nagendragugulothu6@gmail.com<br>&#128222; <b>Phone:</b> (640) 500-1415<br>&#128205; <b>Location:</b> New York, USA<br><br>Feel free to reach out anytime!";
  }

  if (/schedul|interview|meet|availab|appoint|book|call/i.test(m)) {
    return "__SCHEDULE__";
  }

  if (/linkedin|resume|cv/i.test(m)) {
    return "I'd be happy to share my resume or LinkedIn! Please email me at <b>nagendragugulothu6@gmail.com</b> or call <b>(640) 500-1415</b> and I'll send it right over.";
  }

  if (/ga4|google analytics/i.test(m)) {
    return "I have strong hands-on experience with <b>Google Analytics 4 (GA4)</b> &#8212; setting up events, conversions, funnels, audiences, and custom reports. I also use GA4 with BigQuery exports for advanced attribution modeling. &#128202;";
  }

  if (/attribut|mmm|marketing mix|multi.touch/i.test(m)) {
    return "<b>Attribution modeling</b> is one of my specialties! I've worked with multi-touch attribution models (first-touch, last-touch, linear, data-driven) and <b>Marketing Mix Modeling (MMM)</b> to understand which channels truly drive conversions and optimize budget allocation. &#127919;";
  }

  if (/a\/b|ab test|split test|experiment/i.test(m)) {
    return "I love A/B testing! I've designed and analyzed many experiments &#8212; landing page variations, email subject lines, CTA buttons, and ad creatives. I use statistical significance testing to make sure results are reliable before making decisions. &#128300;";
  }

  if (/sql|python|bigquery|snowflake|code|query/i.test(m)) {
    return "I'm proficient in both <b>SQL and Python</b>! I use SQL daily for querying BigQuery and Snowflake, building data pipelines, and creating segmentation queries. With Python I automate reporting, run statistical analyses, and build predictive models for campaign optimization. &#128187;";
  }

  if (/tableau|power bi|dashboard|visual|report/i.test(m)) {
    return "I build professional <b>marketing dashboards in both Tableau and Power BI</b>! They cover campaign performance, customer journeys, attribution, ROI tracking, and funnel analysis &#8212; designed to be executive-ready and connected to live data sources. &#128202;";
  }

  if (/google ads|meta ads|facebook ads|linkedin ads|paid ads|ppc/i.test(m)) {
    return "I have extensive experience managing <b>Google Ads, Meta Ads (Facebook/Instagram), and LinkedIn Ads</b>. I handle campaign setup, audience targeting, bid optimization, creative testing, and performance analysis. I focus on maximizing ROAS and minimizing CPA. &#128226;";
  }

  if (/seo|sem|search engine|organic|keyword/i.test(m)) {
    return "I have solid experience in <b>SEO &amp; SEM analytics</b> &#8212; keyword research, ranking analysis, organic traffic tracking, technical SEO audits, and paid search campaign optimization. I use tools like GA4, Google Search Console, and SEMrush. &#128269;";
  }

  if (/cro|conversion|funnel|landing page|optimize/i.test(m)) {
    return "I specialize in <b>Conversion Rate Optimization (CRO)</b> and funnel analysis. I identify drop-off points in customer journeys, run A/B tests, and implement data-driven improvements that increase conversions and revenue. &#128200;";
  }

  if (/bye|goodbye|see you|that.s all|good night/i.test(m)) {
    return "It was great chatting! &#128522; Feel free to reach out anytime at <b>nagendragugulothu6@gmail.com</b> or <b>(640) 500-1415</b>. Have a wonderful day! &#128075;";
  }

  if (/thank|thanks|appreciate|helpful|great/i.test(m)) {
    return "You're very welcome! &#128522; Happy to help. Is there anything else you'd like to know about my experience or would you like to schedule an interview?";
  }

  return "Great question! I'd love to discuss this in more detail. You can reach me at <b>nagendragugulothu6@gmail.com</b> or <b>(640) 500-1415</b>. Or click <b>&#128197; Schedule</b> below to book an interview directly! &#128522;";
}

function showScheduleForm() {
  var f = document.createElement("div");
  f.className = "fb"; f.id = "sform";
  f.innerHTML = "<h4>&#128197; Schedule an Interview with Nagendra</h4>" +
    "<input type='text' id='rn' placeholder='Your Full Name *' />" +
    "<input type='text' id='rc' placeholder='Company Name *' />" +
    "<input type='email' id='re' placeholder='Your Email *' />" +
    "<input type='tel' id='rp' placeholder='Your Phone (optional)' />" +
    "<input type='text' id='rr' placeholder='Role / Position *' />" +
    "<select id='rd'><option value=''>Preferred Day *</option><option>Monday</option><option>Tuesday</option><option>Wednesday</option><option>Thursday</option><option>Friday</option></select>" +
    "<select id='rt'><option value=''>Preferred Time (EST) *</option><option>9:00 AM</option><option>10:00 AM</option><option>11:00 AM</option><option>12:00 PM</option><option>1:00 PM</option><option>2:00 PM</option><option>3:00 PM</option><option>4:00 PM</option><option>5:00 PM</option></select>" +
    "<select id='rf'><option value=''>Interview Format *</option><option>Phone Call</option><option>Zoom</option><option>Google Meet</option><option>Microsoft Teams</option><option>In-Person</option></select>" +
    "<button class='ok' id='okbtn'>&#10003; Confirm Interview Request</button>";
  box.appendChild(f);
  box.scrollTop = box.scrollHeight;
  document.getElementById("okbtn").onclick = submitSchedule;
}

function submitSchedule() {
  var name = document.getElementById("rn").value.trim();
  var comp = document.getElementById("rc").value.trim();
  var email = document.getElementById("re").value.trim();
  var phone = document.getElementById("rp").value.trim();
  var role = document.getElementById("rr").value.trim();
  var day = document.getElementById("rd").value;
  var time = document.getElementById("rt").value;
  var fmt = document.getElementById("rf").value;

  if (!name || !comp || !email || !role || !day || !time || !fmt) {
    alert("Please fill in all required fields marked with *");
    return;
  }

  var sf = document.getElementById("sform");
  if (sf) sf.parentNode.removeChild(sf);

  var msg = "&#10003; <b>Interview Request Confirmed!</b><br><br>" +
    "&#128203; <b>Summary:</b><br>" +
    "&#128100; Recruiter: " + name + "<br>" +
    "&#127970; Company: " + comp + "<br>" +
    "&#128231; Email: " + email + "<br>" +
    (phone ? "&#128222; Phone: " + phone + "<br>" : "") +
    "&#128188; Role: " + role + "<br>" +
    "&#128197; Day: " + day + "<br>" +
    "&#128336; Time: " + time + " (EST)<br>" +
    "&#127909; Format: " + fmt + "<br><br>" +
    "Thank you <b>" + name + "</b>! Nagendra will confirm shortly via email at <b>nagendragugulothu6@gmail.com</b> or phone <b>(640) 500-1415</b>. Looking forward to connecting! &#127881;";

  addMsg(msg, "b");

  emailjs.send("service_yv7s8tl", "template_3eto1jo", {
      candidate_name: "Nagendra Babu Gugulothu",
      position: role,
      company: comp,
      interview_date: day,
      interview_time: time + " (EST)",
      interview_mode: fmt,
      interviewer_name: name,
      additional_message: phone ? "Phone: " + phone : "No phone provided",
      from_name: name,
      to_email: "nagendragugulothu6@gmail.com",
      reply_to: email
    }).then(function() {
      console.log("Interview request sent successfully via EmailJS!");
    }, function(err) {
      // Fallback to mailto if EmailJS fails
      var body = "Interview Request\nName: " + name + "\nCompany: " + comp + "\nEmail: " + email + "\nPhone: " + (phone || "N/A") + "\nRole: " + role + "\nDay: " + day + "\nTime: " + time + " (EST)\nFormat: " + fmt;
      var sub = "Interview Request from " + name + " - " + comp;
      window.location.href = "mailto:nagendragugulothu6@gmail.com?subject=" + encodeURIComponent(sub) + "&body=" + encodeURIComponent(body);
    })
}

function send(txt) {
  txt = txt.trim();
  if (!txt) return;
  addMsg(txt, "u");
  showTyping();
  var delay = 700 + Math.floor(Math.random() * 500);
  setTimeout(function() {
    removeTyping();
    var reply = getReply(txt);
    if (reply === "__SCHEDULE__") {
      addMsg("I'd love to connect! &#128522; I'm available <b>Monday through Friday</b> and flexible based on your schedule. Please fill out the form below:", "b");
      setTimeout(showScheduleForm, 200);
    } else {
      addMsg(reply, "b");
    }
  }, delay);
}

snd.onclick = function() {
  var v = inp.value;
  inp.value = "";
  send(v);
};

inp.onkeydown = function(e) {
  if (e.key === "Enter") {
    var v = inp.value;
    inp.value = "";
    send(v);
  }
};

document.getElementById("s1").onclick = function() { send("Tell me about yourself"); };
document.getElementById("s2").onclick = function() { send("What are your skills?"); };
document.getElementById("s3").onclick = function() { send("Tell me about your experience"); };
document.getElementById("s4").onclick = function() { send("I want to schedule an interview"); };
document.getElementById("s5").onclick = function() { send("What is your contact info?"); };
document.getElementById("s6").onclick = function() { send("Tell me about your education"); };

// Welcome message
setTimeout(function() {
  showTyping();
  setTimeout(function() {
    removeTyping();
    addMsg("&#128075; Hi there! I'm <b>Nagendra Babu Gugulothu</b>, a Marketing Analyst with 4+ years of experience in digital marketing and analytics, based in New York USA.<br><br>Ask me anything about my background, skills, experience &#8212; or click <b>&#128197; Schedule</b> to book an interview! How can I help you?", "b");
  }, 1000);
}, 400);

inp.focus();

})();
</script>
</body>
</html>
